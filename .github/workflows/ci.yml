name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: PHP Lint & Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, sqlite3
          tools: php-cs-fixer, phpstan

      - name: Check PHP syntax
        run: |
          find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

      - name: Run PHP CS Fixer (dry-run)
        run: |
          php-cs-fixer fix --dry-run --diff --allow-risky=yes || true

  test:
    name: PHP Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, sqlite3
          coverage: xdebug

      - name: Create data directory
        run: mkdir -p data

      - name: Verify PHP files load without errors
        run: |
          php -r "require 'config/database.php'; echo 'Database config OK\n';"

  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "password\s*=\s*['\"][^'\"]\+['\"]" --include="*.php" . || echo "Warning: Possible hardcoded passwords found"
          ! grep -rn "api_key\s*=\s*['\"][^'\"]\+['\"]" --include="*.php" . || echo "Warning: Possible hardcoded API keys found"
